version: "3.9"

# ────────────────────────────────────────────────────
# Service Platform — Docker Compose (Production-ready)
# ────────────────────────────────────────────────────
services:

  # ── PostgreSQL ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: service_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expose only when debugging; remove in prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ── Django App (Gunicorn) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: service_platform_app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    expose:
      - "8000"
    networks:
      - backend
      - frontend

  # ── Nginx (reverse proxy + static files) ────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: service_platform_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/static:ro
      - media_files:/media:ro
      # Uncomment for Let's Encrypt:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - frontend

volumes:
  postgres_data:
  static_files:
  media_files:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
