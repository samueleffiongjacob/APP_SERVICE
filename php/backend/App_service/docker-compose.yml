services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lead_api_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-leadapi}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: file
      LOG_CHANNEL: stderr
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/storage/app
      - logs_data:/var/www/storage/logs
    networks:
      - lead_network

  postgres:
    image: postgres:16-alpine
    container_name: lead_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-leadapi}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-leadapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lead_network

volumes:
  postgres_data:
  storage_data:
  logs_data:

networks:
  lead_network:
    driver: bridge
