services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-service_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not published to the host by default — only the `app` service on
    # the internal docker network needs to reach Postgres. Uncomment
    # if you want to connect a local GUI client (psql, TablePlus, etc):
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-service_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        # Waits for the healthcheck above to pass, not just for the
        # container to start — Postgres takes a moment after start to
        # actually accept connections, and a bare `depends_on: [db]`
        # would let the app race ahead and fail its first connection.
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-service_platform}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${APP_PORT:-8083}:8083"

volumes:
  pgdata:
