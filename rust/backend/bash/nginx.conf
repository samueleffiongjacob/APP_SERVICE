# Reverse proxy for the service-platform Rust binary running directly
# on the host (e.g. via systemd — see DEPLOY.md), NOT inside Docker.
#
# Replace `api.example.com` with your real domain before deploying.
# Install under /etc/nginx/sites-available/service-platform and symlink
# into sites-enabled, or include it from your existing nginx.conf.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.example.com;

    # Generated via certbot (see DEPLOY.md) or your own certificate.
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Reasonable size limit for JSON request bodies — adjust if you
    # expect larger payloads (file uploads, etc).
    client_max_body_size 5m;

    access_log /var/log/nginx/service-platform.access.log;
    error_log  /var/log/nginx/service-platform.error.log;

    location / {
        proxy_pass http://127.0.0.1:8083;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection: "" + Upgrade header here only matter if you add a
        # websocket route later; harmless to leave in for a plain REST
        # API, and saves a future edit if you do add one.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8083/health;
        access_log off;
    }
}
