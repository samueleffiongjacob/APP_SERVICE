upstream service_platform_app {
    # "app" resolves via Docker's internal DNS to the app container,
    # since they share the app-network defined in docker-compose.yml.
    server app:8080;
}

server {
    listen 80;
    server_name _;

    # Real-world request bodies are rarely huge here, but LeadRequest /
    # signup payloads plus headroom — adjust if you start accepting
    # uploads through this API.
    client_max_body_size 5M;

    location / {
        proxy_pass http://service_platform_app;
        proxy_http_version 1.1;

        # Forward original client info to the Spring Boot app, otherwise
        # every request looks like it came from the nginx container itself.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Reasonable timeouts; raise if any endpoint does slow processing
        # (e.g. large document handling, as in your other services).
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Lets you check nginx itself is up, separate from the app's own
    # /api/health behind it.
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
