services:
  postgres:
    image: postgres:16-alpine
    container_name: service-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-service_platform}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Named volume persists data across container restarts/recreations.
      # Without this, `docker-compose down` would wipe your database.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-service_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    # No ports exposed to the host on purpose — only the app container
    # needs to reach Postgres, and it does so over the internal Docker
    # network. Don't add a "ports:" mapping here in production.

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service-platform-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # DATABASE_URL built from the same vars Postgres uses, so credentials
      # only ever need to be defined once, in .env.production.
      DATABASE_URL: postgres://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-service_platform}
      SERVER_PORT: ${SERVER_PORT:-8080}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      postgres:
        # Waits for Postgres's actual healthcheck (pg_isready), not just
        # "container started" — avoids the classic race where the app
        # boots before Postgres is ready to accept connections.
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - app-network
    # No host port mapping here either — nginx is the only public-facing
    # entry point. The app is reached at app:8080 from inside the network.

  nginx:
    image: nginx:1.27-alpine
    container_name: service-platform-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
