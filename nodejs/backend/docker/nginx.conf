# Reverse proxy for the service-platform-express Node process running
# directly on the host (e.g. via systemd — see DEPLOY.md), NOT inside
# Docker.
#
# Uses a separate subdomain from the Rust service's nginx config
# (express-api.example.com vs api.example.com) so both APIs can sit
# behind the same nginx instance without colliding. Replace both
# domains with your real ones — or merge into one server block with
# location-based routing (e.g. /v1/rust/, /v1/express/) if you'd rather
# expose them under a single domain; that's a deliberate choice this
# file doesn't make for you.

server {
    listen 80;
    listen [::]:80;
    server_name express-api.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name express-api.example.com;

    ssl_certificate     /etc/letsencrypt/live/express-api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/express-api.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 5m;

    access_log /var/log/nginx/service-platform-express.access.log;
    error_log  /var/log/nginx/service-platform-express.error.log;

    location / {
        proxy_pass http://127.0.0.1:8084;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8084/health;
        access_log off;
    }
}
