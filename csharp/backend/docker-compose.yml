services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lead_api_csharp
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${DB_DATABASE:-leadapi};Username=${DB_USERNAME:-postgres};Password=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lead_network

  postgres:
    image: postgres:16-alpine
    container_name: lead_api_postgres_csharp
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-leadapi}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-leadapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lead_network

volumes:
  postgres_data:

networks:
  lead_network:
    driver: bridge
